<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   <div class="container">
    <div class="personal-content">
        <div class="login-form">
            <h2>Personal Section</h2>
            <form id="auth-form">
                <input type="password" id="auth-password" placeholder="Enter Password" required>
                <button type="submit" class="submit-button">Access</button>
            </form>
        </div>
        <div class="personal-info hidden">
            <h2>Personal Information</h2>
            <div class="sensitive-content">
                <!-- Your personal information will be displayed here after authentication -->
            </div>
        </div>
    </div>
</div>
</body>
</html>
