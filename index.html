<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victor Maina</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0c; font-family: 'Courier New', monospace; overflow: hidden; width: 100vw; height: 100vh; }

#app { display: flex; width: 100vw; height: 100vh; }

/* ── Chess side ── */
#chess-side { flex: 1; position: relative; overflow: hidden; min-width: 0; }
#chess-canvas { width: 100%; height: 100%; display: block; }

#header { position: absolute; top: 20px; left: 24px; z-index: 10; pointer-events: none; }
#header h1 { font-size: 22px; font-weight: 700; color: #e8e8e0; letter-spacing: 0.05em; }
#header p  { font-size: 10px; color: #4ade80; letter-spacing: 0.15em; margin-top: 4px; opacity: 0.6; }

#hint {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: #4ade80; letter-spacing: 0.12em; opacity: 0.4;
  pointer-events: none; text-align: center; white-space: nowrap;
}
#tooltip {
  position: absolute; pointer-events: none; z-index: 20;
  background: rgba(10,10,12,0.92); border: 1px solid #4ade80;
  padding: 4px 10px; font-size: 10px; color: #4ade80;
  letter-spacing: 0.12em; display: none; white-space: nowrap;
  backdrop-filter: blur(4px);
}
#piece-label {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none; z-index: 15; text-align: center; display: none;
}
#piece-label .pname  { font-size: 28px; font-weight: 700; color: #e8e8e0; letter-spacing: 0.08em; text-shadow: 0 0 40px rgba(74,222,128,0.6); }
#piece-label .psub   { font-size: 10px; color: #4ade80; letter-spacing: 0.2em; margin-top: 8px; opacity: 0.7; }
#piece-label .pclick { font-size: 9px;  color: #4ade8066; letter-spacing: 0.15em; margin-top: 4px; }

/* ── Terminal side ── */
#terminal-side {
  width: 360px; min-width: 300px;
  border-left: 1px solid #1a1a24;
  display: flex; flex-direction: column;
  background: #06060e; overflow: hidden;
}
#term-header {
  padding: 10px 14px; border-bottom: 1px solid #141420;
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.term-dot { width: 10px; height: 10px; border-radius: 50%; }
.term-dot.r { background: #ff5f57; }
.term-dot.y { background: #febc2e; }
.term-dot.g { background: #28c840; }
#term-title { font-size: 10px; color: #4ade80; letter-spacing: 0.18em; margin-left: 6px; opacity: 0.7; flex: 1; text-align: center; }
#term-body {
  flex: 1; overflow-y: auto; padding: 14px 16px 20px;
  font-size: 12px; line-height: 1.75; color: #a0a090;
  scrollbar-width: thin; scrollbar-color: #1e1e2a transparent;
}
#term-body::-webkit-scrollbar { width: 3px; }
#term-body::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }

.tl       { display: block; min-height: 1.75em; }
.tl.cmd   { color: #4ade80; }
.tl.out   { color: #7a8a7a; }
.tl.hi    { color: #e8e8e0; }
.tl.quote { color: #6ee7b7; font-style: italic; }
.tl.move  { color: #5a6a5a; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
.tl.key   { color: #fbbf24; font-weight: 700; }
.tl.now   { color: #60a5fa; }
.tl.blank { min-height: 0.7em; }
.cursor-blink {
  display: inline-block; width: 7px; height: 13px;
  background: #4ade80; vertical-align: middle;
  animation: cblink 1s step-end infinite; margin-left: 1px;
}
@keyframes cblink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Page overlay ── */
#overlay {
  position: fixed; inset: 0; z-index: 50; display: none;
  background: #0a0a0c; overflow-y: auto;
}
#overlay.active { display: flex; flex-direction: column; }
.page-bg {
  position: absolute; inset: 0; opacity: 0.04; font-size: 300px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; overflow: hidden; user-select: none; line-height: 1;
}
.page-content { position: relative; z-index: 2; padding: 32px 40px; flex: 1; max-width: 900px; }
.page-back {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; color: #4ade80; letter-spacing: 0.15em; cursor: pointer;
  border: 1px solid #4ade8055; padding: 6px 14px; margin-bottom: 32px;
  background: transparent; font-family: 'Courier New', monospace;
  transition: background 0.2s, border-color 0.2s;
}
.page-back:hover { background: rgba(74,222,128,0.08); border-color: #4ade80; }
.page-title { font-size: 28px; font-weight: 700; color: #e8e8e0; margin-bottom: 6px; letter-spacing: 0.04em; }
.page-title span { color: #4ade80; }
.page-rule { border: none; border-top: 1px solid #4ade8030; margin-bottom: 28px; }
.terminal-block { background: #0e0e12; border: 1px solid #1e1e26; padding: 24px; font-size: 13px; color: #c8c8c0; line-height: 1.9; margin-bottom: 20px; }
.terminal-block .prompt { color: #4ade80; margin-right: 8px; }
.terminal-block .comment { color: #3a3a4a; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 16px; }
.project-card { background: #0e0e12; border: 1px solid #1e1e26; padding: 18px; transition: border-color 0.2s; }
.project-card:hover { border-color: #4ade8066; }
.project-card .pc-icon  { font-size: 22px; margin-bottom: 10px; }
.project-card .pc-title { font-size: 13px; font-weight: 700; color: #e8e8e0; margin-bottom: 6px; }
.project-card .pc-desc  { font-size: 12px; color: #666; line-height: 1.6; }
.project-card .pc-tag   { display: inline-block; font-size: 10px; color: #4ade80; border: 1px solid #4ade8033; padding: 2px 7px; margin-top: 10px; letter-spacing: 0.1em; }
.list-items { list-style: none; }
.list-items li { padding: 9px 0; border-bottom: 1px solid #141418; font-size: 13px; color: #c8c8c0; display: flex; align-items: baseline; gap: 10px; }
.list-items li::before { content: '—'; color: #4ade80; flex-shrink: 0; }
.exp-item { margin-bottom: 20px; padding-left: 16px; border-left: 2px solid #4ade8030; }
.exp-item .role { font-size: 14px; color: #e8e8e0; font-weight: 700; }
.exp-item .org  { font-size: 11px; color: #4ade80; letter-spacing: 0.12em; margin: 4px 0; }
.exp-item .note { font-size: 12px; color: #555; }
.contact-row { display: flex; align-items: center; gap: 16px; padding: 11px 0; border-bottom: 1px solid #141418; }
.contact-row .cr-label { font-size: 11px; color: #4ade80; letter-spacing: 0.14em; min-width: 80px; }
.contact-row .cr-val   { font-size: 13px; color: #c8c8c0; }
.uses-section { margin-bottom: 16px; }
.uses-section .us-cat { font-size: 11px; color: #4ade80; letter-spacing: 0.16em; margin-bottom: 6px; }

@media (max-width: 900px) {
  #app { flex-direction: column; }
  #chess-side { height: 58vh; }
  #terminal-side { width: 100%; min-width: 0; border-left: none; border-top: 1px solid #1a1a24; height: 42vh; }
}
</style>
</head>

            {cat:'Hardware',items:['Windows 11 PC','External monitor','Mechanical keyboard']},
            {cat:'Chess',items:['chess.com (online)','Lichess (analysis)','Physical Staunton set']},
            {cat:'Tools',items:['GitHub','Figma','Postman']},
          ].map(s=>`
            <div class="uses-section">
              <div class="us-cat">${s.cat.toUpperCase()}/</div>
              <ul class="list-items">${s.items.map(i=>`<li>${i}</li>`).join('')}</ul>
            </div>`).join('')}
        </div>
      </div>`
  },
};

/* ═══════════════════════════════════════════════════
   PIECE TEXTURES
   Primary: Lichess cburnett SVGs (open source, free)
   Fallback: canvas-drawn pieces
═══════════════════════════════════════════════════ */

// Lichess cburnett piece set — same pieces used on Lichess.org broadcasts
const LICHESS_BASE  = 'https://lichess1.org/assets/piece/cburnett/';
const PIECE_CODES   = ['wK','wQ','wR','wB','wN','wP','bK','bQ','bR','bB','bN','bP'];
const pieceTex      = {};

function makeCanvasTex(code) {
  const isW  = code[0] === 'w';
  const type = code[1];
  const syms = { K:'♔', Q:'♕', R:'♖', B:'♗', N:'♘', P:'♙' };
  const symB = { K:'♚', Q:'♛', R:'♜', B:'♝', N:'♞', P:'♟' };
  const sym  = isW ? syms[type] : symB[type];

  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, 256, 256);

  // Drop shadow
  ctx.shadowColor  = 'rgba(0,0,0,0.65)';
  ctx.shadowBlur   = 18;
  ctx.shadowOffsetX = 3;
  ctx.shadowOffsetY = 5;

  ctx.font         = 'bold 192px serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  // Outline pass
  ctx.strokeStyle = isW ? '#3a200e' : '#b8802a';
  ctx.lineWidth   = 10;
  ctx.strokeText(sym, 128, 136);

  ctx.shadowColor = 'transparent';

  // Fill pass
  ctx.fillStyle = isW ? '#f2e8d0' : '#1e1008';
  ctx.fillText(sym, 128, 136);

  const tex       = new THREE.CanvasTexture(c);
  tex.needsUpdate = true;
  return tex;
}

async function loadPieceTextures() {
  const loader = new THREE.TextureLoader();

  await Promise.all(PIECE_CODES.map(code => new Promise(resolve => {
    // Try Lichess CDN first
    loader.load(
      LICHESS_BASE + code + '.svg',
      tex => { pieceTex[code] = tex; resolve(); },
      undefined,
      () => {
        // Lichess failed — use canvas fallback
        pieceTex[code] = makeCanvasTex(code);
        resolve();
      }
    );
  })));
}

/* ═══════════════════════════════════════════════════
   THREE.JS — BOARD & PIECE SPRITES
═══════════════════════════════════════════════════ */
const chessRoot   = document.getElementById('chess-side');
const chessCanvas = document.getElementById('chess-canvas');

let scene, camera, renderer, raycaster, mouse;
let pieceMeshes   = [];   // { sprite, type, isW, label, page }
let selectedEntry = null;
let hoveredEntry  = null;
let isDragging    = false, prevMouse = {x:0,y:0};
let camTheta = Math.PI*0.28, camPhi = 1.00, camRadius = 13.5;
let tgtTheta = camTheta, tgtPhi = camPhi, tgtRadius = camRadius;
let animT    = 0;

/* ── Board square texture (chess.com maple/rosewood palette) ── */
function makeSquareTex(isLight) {
  const C   = document.createElement('canvas');
  C.width = C.height = 128;
  const ctx = C.getContext('2d');

  // Base colour — chess.com's classic wood palette
  ctx.fillStyle = isLight ? '#f0d9b5' : '#b58863';
  ctx.fillRect(0, 0, 128, 128);

  // Subtle grain lines
  for (let i = 0; i < 18; i++) {
    const cx = Math.random() * 150 - 10;
    ctx.strokeStyle = isLight
      ? `rgba(150,105,55,${0.05 + Math.random() * 0.09})`
      : `rgba(60,30,8,${0.07 + Math.random() * 0.12})`;
    ctx.lineWidth = 0.6 + Math.random() * 1.4;
    ctx.beginPath();
    ctx.moveTo(cx + Math.random() * 12 - 6, 0);
    ctx.bezierCurveTo(
      cx + Math.random() * 24 - 12, 40,
      cx + Math.random() * 24 - 12, 88,
      cx + Math.random() * 12 - 6, 128
    );
    ctx.stroke();
  }

  const tex        = new THREE.CanvasTexture(C);
  tex.needsUpdate  = true;
  return tex;
}

function makeBorderTex() {
  const C   = document.createElement('canvas');
  C.width = C.height = 128;
  const ctx = C.getContext('2d');
  ctx.fillStyle = '#3a1a08';
  ctx.fillRect(0, 0, 128, 128);
  for (let i = 0; i < 14; i++) {
    const x = Math.random() * 140 - 6;
    ctx.strokeStyle = `rgba(22,8,2,${0.12 + Math.random() * 0.18})`;
    ctx.lineWidth   = 1 + Math.random() * 2.5;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.bezierCurveTo(x + Math.random() * 20 - 10, 42, x + Math.random() * 20 - 10, 86, x + Math.random() * 12 - 6, 128);
    ctx.stroke();
  }
  return new THREE.CanvasTexture(C);
}

/* ── Board geometry ── */
function buildBoard() {
  const lightTex  = makeSquareTex(true);
  const darkTex   = makeSquareTex(false);
  const borderTex = makeBorderTex();

  // 8×8 squares
  const sqGeo = new THREE.BoxGeometry(1, 0.10, 1);
  for (let col = 0; col < 8; col++) {
    for (let row = 0; row < 8; row++) {
      const isLight = (col + row) % 2 === 0;
      const mat = new THREE.MeshStandardMaterial({
        map:       isLight ? lightTex : darkTex,
        roughness: 0.75,
        metalness: 0.02,
      });
      const m = new THREE.Mesh(sqGeo, mat);
      m.position.set(col - 3.5, 0, row - 3.5);
      m.receiveShadow = true;
      scene.add(m);
    }
  }

  // Walnut border frame
  const borderMat = new THREE.MeshStandardMaterial({ map: borderTex, roughness: 0.88 });
  scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(10.6, 0.14, 10.6), borderMat), { position: new THREE.Vector3(0, -0.03, 0) }));

  // Inner cherry rail
  const railMat = new THREE.MeshStandardMaterial({ color: 0x6B3A1F, roughness: 0.72 });
  scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(8.28, 0.12, 8.28), railMat), { position: new THREE.Vector3(0, -0.02, 0) }));

  // Base slab
  const slabMat = new THREE.MeshStandardMaterial({ color: 0x1e0a04, roughness: 0.95 });
  const slab = new THREE.Mesh(new THREE.BoxGeometry(10.6, 0.20, 10.6), slabMat);
  slab.position.y = -0.18;
  slab.receiveShadow = true;
  scene.add(slab);

  // Bevel edge highlight
  const edgeMat = new THREE.MeshStandardMaterial({ color: 0x8B4E12, roughness: 0.62, metalness: 0.05 });
  for (let s = 0; s < 4; s++) {
    const a = s * (Math.PI / 2);
    const edge = new THREE.Mesh(new THREE.BoxGeometry(10.6, 0.06, 0.26), edgeMat);
    edge.position.set(Math.sin(a) * 5.17, 0.05, Math.cos(a) * 5.17);
    edge.rotation.y = a;
    scene.add(edge);
  }
}

/* ── Place pieces as sprites from chess.js board state ── */
function buildPieces(chess) {
  // Remove old sprites
  pieceMeshes.forEach(e => scene.remove(e.sprite));
  pieceMeshes = [];

  const board = chess.board();
  // board[row][col]: row 0 = rank 8, col 0 = file a
  // Three.js: x = col − 3.5, z = row − 3.5  (rank8 far/z=-3.5, rank1 near/z=3.5)

  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const sq = board[row][col];
      if (!sq) continue;

      const isW  = sq.color === 'w';
      const code = (isW ? 'w' : 'b') + sq.type.toUpperCase();
      const tex  = pieceTex[code] || makeCanvasTex(code);

      const mat = new THREE.SpriteMaterial({
        map:         tex,
        transparent: true,
        sizeAttenuation: true,
      });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(0.90, 0.90, 1);
      sprite.position.set(col - 3.5, 0.58, row - 3.5);
      sprite.renderOrder = 1;
      scene.add(sprite);

      const label = isW ? LABEL_BY_TYPE[sq.type] : LABEL_BY_TYPE_BLACK[sq.type];
      const page  = isW ? PAGE_BY_TYPE[sq.type]  : PAGE_BY_TYPE_BLACK[sq.type];
      pieceMeshes.push({ sprite, type: sq.type, isW, label, page });
    }
  }
}

/* ── Camera ── */
function updateCam() {
  const x = camRadius * Math.sin(camPhi) * Math.sin(camTheta);
  const y = camRadius * Math.cos(camPhi);
  const z = camRadius * Math.sin(camPhi) * Math.cos(camTheta);
  camera.position.set(x, y, z);
  camera.lookAt(0, 0.5, 0);
}

/* ── Raycasting against sprites ── */
function getHit(e) {
  const r = chessRoot.getBoundingClientRect();
  mouse.set(
    ((e.clientX - r.left) / r.width)  *  2 - 1,
    -((e.clientY - r.top)  / r.height) *  2 + 1
  );
  raycaster.setFromCamera(mouse, camera);
  const sprites = pieceMeshes.map(e => e.sprite);
  const hits    = raycaster.intersectObjects(sprites);
  if (!hits.length) return null;
  const hit = hits[0].object;
  return pieceMeshes.find(e => e.sprite === hit) || null;
}

/* ── Mouse events ── */
function onMD(e) { isDragging = false; prevMouse = {x:e.clientX, y:e.clientY}; }
function onMM(e) {
  const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
  if (e.buttons === 1 && Math.abs(dx) + Math.abs(dy) > 2) {
    isDragging = true;
    tgtTheta  -= dx * 0.007;
    tgtPhi     = Math.max(0.18, Math.min(1.45, tgtPhi + dy * 0.005));
    prevMouse  = {x:e.clientX, y:e.clientY};
  }
  const hit = getHit(e);
  const tip = document.getElementById('tooltip');
  const r   = chessRoot.getBoundingClientRect();
  if (hit) {
    hoveredEntry = hit;
    tip.style.display = 'block';
    tip.style.left = (e.clientX - r.left + 14) + 'px';
    tip.style.top  = (e.clientY - r.top  - 10) + 'px';
    tip.textContent = hit.label;
    chessRoot.style.cursor = 'pointer';
  } else {
    hoveredEntry = null;
    tip.style.display = 'none';
    chessRoot.style.cursor = isDragging ? 'grabbing' : 'default';
  }
}
function onMU() {}
function onWH(e) { tgtRadius = Math.max(6, Math.min(22, tgtRadius + e.deltaY * 0.015)); }
function onCL(e) {
  if (isDragging) { isDragging = false; return; }
  const hit = getHit(e);
  if (hit) {
    if (selectedEntry === hit) openPage(hit.page);
    else selectEntry(hit);
  } else {
    deselectEntry();
  }
}
function onResize() {
  camera.aspect = chessRoot.clientWidth / chessRoot.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(chessRoot.clientWidth, chessRoot.clientHeight);
}

/* ── Selection (tint sprite material) ── */
function selectEntry(entry) {
  deselectEntry();
  selectedEntry = entry;
  entry.sprite.material.color.set(0x90eea0); // green selection tint
  const lbl = document.getElementById('piece-label');
  document.getElementById('pl-name').textContent = entry.label;
  document.getElementById('pl-sub').textContent  =
    ICONS[entry.type] + ' ' + TYPE_NAMES[entry.type].toUpperCase() +
    ' · ' + (entry.isW ? 'WHITE' : 'BLACK');
  lbl.style.display = 'block';
  lbl.style.opacity = '0';
  lbl.style.transition = 'opacity 0.28s';
  setTimeout(() => lbl.style.opacity = '1', 10);
}
function deselectEntry() {
  if (selectedEntry) selectedEntry.sprite.material.color.set(0xffffff);
  selectedEntry = null;
  document.getElementById('piece-label').style.display = 'none';
}

/* ── Pages ── */
function openPage(pageId) {
  const page = PAGES[pageId]; if (!page) return;
  document.getElementById('page-bg-icon').textContent = page.icon;
  document.getElementById('page-inner').innerHTML =
    `<div class="page-title"><span>//</span> ${page.title}</div><hr class="page-rule">${page.render()}`;
  const ov = document.getElementById('overlay');
  ov.classList.add('active');
  ov.scrollTop = 0;
  deselectEntry();
}
function closeOverlay() { document.getElementById('overlay').classList.remove('active'); }

/* ── Animation loop ── */
function animate() {
  requestAnimationFrame(animate);
  animT      = Date.now() * 0.001;
  camTheta  += (tgtTheta  - camTheta)  * 0.07;
  camPhi    += (tgtPhi    - camPhi)    * 0.07;
  camRadius += (tgtRadius - camRadius) * 0.07;
  updateCam();

  const BASE_Y     = 0.58;
  const BASE_SCALE = 0.90;

  pieceMeshes.forEach(entry => {
    const { sprite } = entry;
    const isSel = entry === selectedEntry;
    const isHov = entry === hoveredEntry;

    if (isSel) {
      const ty = BASE_Y + 0.28 + Math.sin(animT * 2.4) * 0.07;
      sprite.position.y += (ty - sprite.position.y) * 0.12;
      const s = BASE_SCALE * 1.12;
      sprite.scale.set(s, s, 1);
    } else if (isHov) {
      sprite.position.y += (BASE_Y + 0.11 - sprite.position.y) * 0.14;
      const s = BASE_SCALE * 1.05;
      sprite.scale.set(s, s, 1);
    } else {
      sprite.position.y += (BASE_Y - sprite.position.y) * 0.09;
      sprite.scale.set(BASE_SCALE, BASE_SCALE, 1);
    }
  });

  renderer.render(scene, camera);
}

/* ── Boot ── */
async function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0c);
  scene.fog = new THREE.FogExp2(0x0a0a0c, 0.022);

  const W = chessRoot.clientWidth, H = chessRoot.clientHeight;
  camera = new THREE.PerspectiveCamera(42, W / H, 0.1, 100);
  updateCam();

  renderer = new THREE.WebGLRenderer({ canvas: chessCanvas, antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled  = true;
  renderer.shadowMap.type     = THREE.PCFSoftShadowMap;
  renderer.toneMapping        = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.10;

  // Lighting
  scene.add(new THREE.AmbientLight(0x1e1e2c, 5.5));

  const key = new THREE.DirectionalLight(0xfff6e8, 2.0);
  key.position.set(4, 14, 3);
  key.castShadow = true;
  key.shadow.mapSize.set(2048, 2048);
  key.shadow.bias = -0.0004;
  key.shadow.camera.near = 0.5; key.shadow.camera.far = 35;
  key.shadow.camera.left = key.shadow.camera.bottom = -9;
  key.shadow.camera.right = key.shadow.camera.top   =  9;
  scene.add(key);

  scene.add(Object.assign(new THREE.DirectionalLight(0xb8d8ff, 0.55), { position: new THREE.Vector3(-5, 6, -5) }));

  const rim1 = new THREE.PointLight(0x4ade80, 0.50, 22); rim1.position.set(-5, 7, -6); scene.add(rim1);
  const rim2 = new THREE.PointLight(0x4ade80, 0.22, 14); rim2.position.set( 6, 3,  6); scene.add(rim2);

  // Build board first (no async needed)
  buildBoard();

  // Preload piece textures from Lichess CDN (canvas fallback built-in)
  await loadPieceTextures();

  // Use chess.js to get the exact position after move 22
  const chess    = new Chess();
  chess.load_pgn(GAME_PGN);
  const allMoves = chess.history();
  chess.reset();
  for (let i = 0; i < 44; i++) chess.move(allMoves[i]);
  buildPieces(chess);

  raycaster = new THREE.Raycaster();
  mouse     = new THREE.Vector2();

  chessCanvas.addEventListener('mousedown', onMD);
  chessCanvas.addEventListener('mousemove', onMM);
  chessCanvas.addEventListener('mouseup',   onMU);
  chessCanvas.addEventListener('click',     onCL);
  chessCanvas.addEventListener('wheel',     onWH, { passive: true });
  window.addEventListener('resize', onResize);
  document.getElementById('back-btn').addEventListener('click', closeOverlay);

  animate();
}

/* ═══════════════════════════════════════════════════
   TERMINAL TYPING ENGINE
═══════════════════════════════════════════════════ */
const termBody   = document.getElementById('term-body');
const termCursor = document.getElementById('term-cursor');
const sleep      = ms => new Promise(r => setTimeout(r, ms));

function scrollTerm() { termBody.scrollTop = termBody.scrollHeight; }

async function typeLine(text, cls, speed = 25) {
  const span = document.createElement('span');
  span.className = 'tl ' + cls;
  termBody.insertBefore(span, termCursor);
  scrollTerm();
  for (const ch of text) {
    span.textContent += ch;
    scrollTerm();
    await sleep(speed + Math.random() * 10);
  }
  await sleep(55);
}

function addBlank() {
  const span = document.createElement('span');
  span.className = 'tl blank';
  termBody.insertBefore(span, termCursor);
  scrollTerm();
}

async function runTerminal() {
  await sleep(900);
  for (const item of TERMINAL_SCRIPT) {
    switch (item.t) {
      case 'cmd':   await typeLine('$ ' + item.s, 'cmd',   28); break;
      case 'out':   await typeLine(item.s,         'out',   22); break;
      case 'hi':    await typeLine(item.s,         'hi',    16); break;
      case 'quote': await typeLine(item.s,         'quote', 20); break;
      case 'move':  await typeLine(item.s,         'move',  11); break;
      case 'key':   await typeLine(item.s,         'key',   15); break;
      case 'now':   await typeLine(item.s,         'now',   15); break;
      case 'b':     addBlank(); await sleep(90);  break;
      case 'p':     await sleep(item.ms);         break;
    }
  }
}

/* ── Start everything ── */
initThree();   // async — pieces appear once textures load
runTerminal(); // starts typing immediately in parallel
window.closeOverlay = closeOverlay;
</script>
