// --- Three.js setup ---
const root = document.getElementById('chess-root');
let scene, camera, renderer, raycaster, mouse;
let pieceMeshes = [];
let selectedMesh = null, selectedPieceData = null;
let hoveredMesh = null;
let isDragging = false, prevMouse = {x:0,y:0};
let camTheta = Math.PI * 0.28, camPhi = 1.0, camRadius = 15;
let targetTheta = camTheta, targetPhi = camPhi, targetRadius = camRadius;
let animT = 0;

function init() {
  const canvas = document.getElementById('chess-canvas');
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0c);
  scene.fog = new THREE.FogExp2(0x0a0a0c, 0.028);

  camera = new THREE.PerspectiveCamera(42, root.clientWidth / root.clientHeight, 0.1, 100);
  updateCam();

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(root.clientWidth, root.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  // Lights
  scene.add(new THREE.AmbientLight(0x1a1a2e, 3));
  const dir = new THREE.DirectionalLight(0xffffff, 1.4);
  dir.position.set(6, 12, 4); dir.castShadow = true;
  dir.shadow.camera.near = 0.1; dir.shadow.camera.far = 40;
  dir.shadow.camera.left = -10; dir.shadow.camera.right = 10;
  dir.shadow.camera.top = 10; dir.shadow.camera.bottom = -10;
  dir.shadow.mapSize.set(1024,1024);
  scene.add(dir);
  const gLight = new THREE.PointLight(0x4ade80, 0.6, 18);
  gLight.position.set(-4, 5, -4);
  scene.add(gLight);
  const gLight2 = new THREE.PointLight(0x4ade80, 0.3, 12);
  gLight2.position.set(4, 3, 4);
  scene.add(gLight2);

  buildBoard();
  buildPieces();

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  canvas.addEventListener('mousedown', onMD);
  canvas.addEventListener('mousemove', onMM);
  canvas.addEventListener('mouseup', onMU);
  canvas.addEventListener('click', onCL);
  canvas.addEventListener('wheel', onWH, {passive:true});
  window.addEventListener('resize', onResize);

  document.getElementById('back-btn').addEventListener('click', closeOverlay);

  animate();
}

function buildBoard() {
  const sqGeo = new THREE.BoxGeometry(1, 0.1, 1);
  for (let x=0;x<8;x++) for (let z=0;z<8;z++) {
    const light = (x+z)%2===0;
    const mat = new THREE.MeshStandardMaterial({
      color: light ? 0x252530 : 0x0f0f16, roughness: 0.85, metalness: 0.05
    });
    const m = new THREE.Mesh(sqGeo, mat);
    m.position.set(x-3.5, 0, z-3.5);
    m.receiveShadow = true;
    scene.add(m);
  }
  // Border
  const bGeo = new THREE.BoxGeometry(9.6, 0.15, 9.6);
  const bMat = new THREE.MeshStandardMaterial({ color: 0x0c0c14, roughness: 0.9 });
  const border = new THREE.Mesh(bGeo, bMat);
  border.position.y = -0.04;
  scene.add(border);
  // Grid lines glow effect using line segments
  const lineMat = new THREE.LineBasicMaterial({ color: 0x4ade8020 });
  for (let i=0;i<=8;i++) {
    const pts = [new THREE.Vector3(i-4,0.06,-4), new THREE.Vector3(i-4,0.06,4)];
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lineMat));
    const pts2 = [new THREE.Vector3(-4,0.06,i-4), new THREE.Vector3(4,0.06,i-4)];
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts2), lineMat));
  }
}

function makePieceGeo(type) {
  switch(type) {
    case 'king': {
      const g = new THREE.CylinderGeometry(0.19, 0.24, 0.7, 8);
      return g;
    }
    case 'queen': {
      return new THREE.CylinderGeometry(0.13, 0.23, 0.65, 6);
    }
    case 'bishop': {
      return new THREE.CylinderGeometry(0.09, 0.21, 0.58, 7);
    }
    case 'knight': {
      return new THREE.BoxGeometry(0.26, 0.52, 0.22);
    }
    case 'rook': {
      return new THREE.BoxGeometry(0.32, 0.48, 0.32);
    }
    default:
      return new THREE.CylinderGeometry(0.11, 0.19, 0.42, 8);
  }
}

function buildPieces() {
  PIECES_DATA.forEach(p => {
    const type = getPieceType(p.id);
    const geo = makePieceGeo(type);
    const isW = p.color === 'white';
    const mat = new THREE.MeshStandardMaterial({
      color: isW ? 0x3a3a4c : 0x18181e,
      roughness: 0.45, metalness: 0.35,
      emissive: isW ? 0x151520 : 0x08080e,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = true;
    mesh.position.set(p.pos[0]-3.5, 0.32, p.pos[1]-3.5);
    mesh.userData = p;
    scene.add(mesh);
    pieceMeshes.push(mesh);
  });
}

function updateCam() {
  const x = camRadius * Math.sin(camPhi) * Math.sin(camTheta);
  const y = camRadius * Math.cos(camPhi);
  const z = camRadius * Math.sin(camPhi) * Math.cos(camTheta);
  camera.position.set(x, y, z);
  camera.lookAt(0, 0.5, 0);
}

function getMouseNDC(e) {
  const r = root.getBoundingClientRect();
  return {
    x: ((e.clientX-r.left)/root.clientWidth)*2-1,
    y: -((e.clientY-r.top)/root.clientHeight)*2+1
  };
}

function onMD(e) {
  isDragging = false;
  prevMouse = {x:e.clientX,y:e.clientY};
}
function onMM(e) {
  const dx = e.clientX-prevMouse.x, dy = e.clientY-prevMouse.y;
  if (e.buttons===1 && (Math.abs(dx)+Math.abs(dy))>2) {
    isDragging = true;
    targetTheta -= dx*0.007;
    targetPhi = Math.max(0.28, Math.min(1.38, targetPhi+dy*0.005));
    prevMouse = {x:e.clientX,y:e.clientY};
  }
  const nd = getMouseNDC(e);
  mouse.set(nd.x, nd.y);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(pieceMeshes);
  const tip = document.getElementById('tooltip');
  const r = root.getBoundingClientRect();
  if (hits.length>0) {
    hoveredMesh = hits[0].object;
    const p = hoveredMesh.userData;
    tip.style.display = 'block';
    tip.style.left = (e.clientX-r.left+14)+'px';
    tip.style.top = (e.clientY-r.top-10)+'px';
    tip.textContent = p.label;
    root.style.cursor = 'pointer';
  } else {
    hoveredMesh = null;
    tip.style.display = 'none';
    root.style.cursor = isDragging ? 'grabbing' : 'default';
  }
}
function onMU() {}
function onWH(e) {
  targetRadius = Math.max(6, Math.min(22, targetRadius+e.deltaY*0.015));
}
function onCL(e) {
  if (isDragging) { isDragging=false; return; }
  const nd = getMouseNDC(e);
  mouse.set(nd.x, nd.y);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(pieceMeshes);
  if (hits.length>0) {
    const mesh = hits[0].object;
    const pd = mesh.userData;
    if (selectedMesh === mesh) {
      openPage(pd.page);
    } else {
      selectPiece(mesh, pd);
    }
  } else {
    deselectPiece();
  }
}
function onResize() {
  camera.aspect = root.clientWidth/root.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(root.clientWidth, root.clientHeight);
}

function selectPiece(mesh, pd) {
  deselectPiece();
  selectedMesh = mesh;
  selectedPieceData = pd;
  mesh.material.color.set(0x4ade80);
  mesh.material.emissive.set(0x1a4a20);
  const lbl = document.getElementById('piece-label');
  document.getElementById('pl-name').textContent = pd.label;
  const type = getPieceType(pd.id);
  document.getElementById('pl-sub').textContent = PIECE_ICONS[type] + ' ' + type.toUpperCase();
  lbl.style.display = 'block';
  lbl.style.opacity = '0';
  lbl.style.transition = 'opacity 0.3s';
  setTimeout(()=>lbl.style.opacity='1', 10);
}
function deselectPiece() {
  if (selectedMesh) {
    const isW = selectedMesh.userData.color==='white';
    selectedMesh.material.color.set(isW ? 0x3a3a4c : 0x18181e);
    selectedMesh.material.emissive.set(isW ? 0x151520 : 0x08080e);
  }
  selectedMesh = null; selectedPieceData = null;
  document.getElementById('piece-label').style.display='none';
}

function openPage(pageId) {
  const page = PAGES[pageId];
  if (!page) return;
  document.getElementById('page-bg-icon').textContent = page.icon;
  document.getElementById('page-inner').innerHTML = `
    <div class="page-title"><span>//</span> ${page.title}</div>
    <hr class="page-rule">
    ${page.render()}
  `;
  const ov = document.getElementById('overlay');
  ov.classList.add('active');
  ov.scrollTop = 0;
  deselectPiece();
}
function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
}

function animate() {
  requestAnimationFrame(animate);
  animT = Date.now()*0.001;
  camTheta += (targetTheta-camTheta)*0.07;
  camPhi += (targetPhi-camPhi)*0.07;
  camRadius += (targetRadius-camRadius)*0.07;
  updateCam();

  pieceMeshes.forEach((mesh, i) => {
    const isSelected = mesh===selectedMesh;
    const isHovered = mesh===hoveredMesh;
    const baseY = 0.32;
    if (isSelected) {
      const ty = baseY + 0.22 + Math.sin(animT*2.5)*0.07;
      mesh.position.y += (ty-mesh.position.y)*0.12;
      mesh.rotation.y += 0.025;
    } else if (isHovered) {
      mesh.position.y += (baseY+0.1-mesh.position.y)*0.15;
    } else {
      mesh.position.y += (baseY-mesh.position.y)*0.1;
      mesh.rotation.y += 0.003;
    }
  });

  renderer.render(scene, camera);
}

window.closeOverlay = closeOverlay;
init();
</script>
</body>
